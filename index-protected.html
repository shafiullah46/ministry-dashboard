<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministry of Planning — Secure Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0F3460 0%,#185FA5 60%,#1D9E75 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.lock-card{background:#fff;border-radius:24px;padding:44px 40px;max-width:420px;width:92%;box-shadow:0 24px 80px rgba(0,0,0,.35);text-align:center;}
.lock-icon{width:72px;height:72px;background:linear-gradient(135deg,#0F3460,#1D9E75);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 24px rgba(24,95,165,.35);}
.lock-icon svg{width:34px;height:34px;fill:#fff;}
.lock-title{font-size:22px;font-weight:700;color:#1A202C;margin-bottom:6px;}
.lock-sub{font-size:13px;color:#718096;margin-bottom:28px;line-height:1.5;}
.lock-label{display:block;text-align:left;font-size:12px;font-weight:600;color:#4A5568;margin-bottom:6px;letter-spacing:.04em;}
.lock-input-wrap{position:relative;margin-bottom:20px;}
.lock-input{width:100%;padding:13px 44px 13px 16px;border:2px solid #E2E6EA;border-radius:12px;font-size:15px;color:#1A202C;outline:none;transition:border .2s;}
.lock-input:focus{border-color:#185FA5;}
.lock-input.wrong{border-color:#E53E3E;animation:shake .4s ease;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#718096;font-size:18px;}
.lock-btn{width:100%;padding:14px;background:linear-gradient(135deg,#185FA5,#1D9E75);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;letter-spacing:.03em;}
.lock-btn:hover{opacity:.9;}
.lock-btn:active{opacity:.8;}
.lock-err{color:#E53E3E;font-size:12px;font-weight:600;margin-top:10px;display:none;background:#FFF5F5;padding:8px 12px;border-radius:8px;border:1px solid #FEB2B2;}
.lock-footer{margin-top:22px;font-size:11px;color:#A0AEC0;}
.lock-footer b{color:#4A5568;}
.attempts-left{font-size:11px;color:#BA7517;margin-top:8px;display:none;font-weight:600;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
#dashboard-frame{display:none;width:100%;height:100vh;border:none;}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <div class="lock-title">Secure Ministry Dashboard</div>
    <div class="lock-sub">Government of Pakistan — Planning Commission<br>Authorized Access Only</div>
    <label class="lock-label">PASSWORD</label>
    <div class="lock-input-wrap">
      <input type="password" id="pwd-input" class="lock-input" placeholder="Enter password..." onkeydown="if(event.key==='Enter')checkPwd()" autocomplete="off" spellcheck="false">
      <button class="eye-btn" onclick="toggleEye()" id="eye-btn" title="Show/Hide password">&#128065;</button>
    </div>
    <button class="lock-btn" onclick="checkPwd()">&#128274; &nbsp;Access Dashboard</button>
    <div class="lock-err" id="lock-err">&#10007; &nbsp;Galat password! Dobara koshish karein.</div>
    <div class="attempts-left" id="att-left"></div>
    <div class="lock-footer">&#128275; <b>Ministry of Planning, Development &amp; Special Initiatives</b><br>Unauthorized access is prohibited.</div>
  </div>
</div>

<iframe id="dashboard-frame" src="" title="Ministry Dashboard"></iframe>

<script>
// Disable right-click everywhere
document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });
// Disable key shortcuts
document.addEventListener('keydown', function(e){
  if((e.ctrlKey||e.metaKey) && ['u','U','s','S','a','A','p','P','c','C'].includes(e.key)){ e.preventDefault(); return false; }
  if(e.key==='F12'||e.key==='F5'){ e.preventDefault(); return false; }
  if(e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C','k','K'].includes(e.key)){ e.preventDefault(); return false; }
});
// Disable text selection
document.addEventListener('selectstart', function(e){ if(!e.target.closest('input')) e.preventDefault(); });
// Detect devtools
(function devToolsCheck(){
  const t=setInterval(function(){
    const s=window.outerWidth-window.innerWidth>100||window.outerHeight-window.innerHeight>100;
    if(s){ document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0F3460;color:#fff;font-family:Arial;font-size:18px;text-align:center;padding:20px;">&#9888; Unauthorized Access Detected.<br>Please close Developer Tools.</div>'; clearInterval(t); }
  },1000);
})();

let attempts = 0;
const MAX = 5;
const CORRECT = 'Ministry@1234';

function checkPwd(){
  if(attempts >= MAX){ lockout(); return; }
  const val = document.getElementById('pwd-input').value;
  if(val === CORRECT){
    unlock();
  } else {
    attempts++;
    const inp = document.getElementById('pwd-input');
    inp.classList.add('wrong');
    setTimeout(()=>inp.classList.remove('wrong'), 500);
    document.getElementById('lock-err').style.display='block';
    inp.value='';
    const left = MAX - attempts;
    const att = document.getElementById('att-left');
    if(left <= 3 && left > 0){
      att.style.display='block';
      att.textContent = '⚠ ' + left + ' koshish baqi hain — phir access band ho jayega!';
    }
    if(attempts >= MAX) lockout();
  }
}

function lockout(){
  document.querySelector('.lock-card').innerHTML = '<div style="padding:20px;"><div style="font-size:48px;margin-bottom:16px;">🔒</div><div style="font-size:18px;font-weight:700;color:#E53E3E;margin-bottom:10px;">Access Blocked</div><div style="font-size:13px;color:#4A5568;line-height:1.6;">Zyada galat passwords ki wajah se access band kar diya gaya hai.<br><br>Please authorized personnel se rabta karein.</div></div>';
}

function unlock(){
  document.getElementById('lock-screen').style.display='none';
  const frame = document.getElementById('dashboard-frame');
  // Embed dashboard content directly
  frame.style.display='block';
  // Write dashboard into iframe
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(atob(DASHBOARD_B64));
  doc.close();
  // Re-apply protections inside frame after load
  frame.contentWindow.addEventListener('contextmenu', e=>e.preventDefault());
  frame.contentWindow.addEventListener('keydown', function(e){
    if((e.ctrlKey||e.metaKey) && ['u','U','s','S','p','P'].includes(e.key)){ e.preventDefault(); }
    if(e.key==='F12'){ e.preventDefault(); }
    if(e.ctrlKey && e.shiftKey){ e.preventDefault(); }
  });
}

function toggleEye(){
  const inp=document.getElementById('pwd-input');
  const btn=document.getElementById('eye-btn');
  if(inp.type==='password'){ inp.type='text'; btn.innerHTML='&#128065;&#65038;'; }
  else { inp.type='password'; btn.innerHTML='&#128065;'; }
}
</script>
