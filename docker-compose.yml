version: '3.8'

# ─────────────────────────────────────────────────────────────
#  Ministry Dashboard — Docker Compose
#  Usage:
#    Development : docker compose up
#    Production  : docker compose -f docker-compose.yml up -d
# ─────────────────────────────────────────────────────────────

services:

  # ── Main Dashboard Service ───────────────────────────────────
  ministry-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: YOUR-DOCKERHUB-USERNAME/ministry-dashboard:latest
    container_name: ministry-dashboard
    ports:
      - "8080:80"        # Access at http://localhost:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "app=ministry-dashboard"
      - "version=1.0.0"
      - "environment=production"
      - "ministry=planning-pakistan"

# ── Networks ─────────────────────────────────────────────────
networks:
  default:
    name: ministry-network
